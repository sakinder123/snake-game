<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>
<style>
canvas{
    border:2px solid black;
    background:#111;
}
body{
    text-align:center;
    font-family:Arial;
}
</style>
</head>
<body>
<h2>Snake Game</h2>
<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake = [{x:200,y:200}];
let food = {x:100,y:100};
let dx = 0;
let dy = 0;
let score = 0;

document.addEventListener("keydown", changeDirection);

function changeDirection(e){
    if(e.key==="ArrowUp" && dy===0){dx=0;dy=-20;}
    if(e.key==="ArrowDown" && dy===0){dx=0;dy=20;}
    if(e.key==="ArrowLeft" && dx===0){dx=-20;dy=0;}
    if(e.key==="ArrowRight" && dx===0){dx=20;dy=0;}
}

function draw(){
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,400,400);

   snake.forEach((part,index)=>{
    ctx.fillStyle="green";
    ctx.beginPath();
    ctx.arc(part.x+10, part.y+10, 10, 0, Math.PI*2);
    ctx.fill();

    if(index===0){
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(part.x+6, part.y+7, 2, 0, Math.PI*2);
        ctx.arc(part.x+14, part.y+7, 2, 0, Math.PI*2);
        ctx.fill();
    }
});

    ctx.fillStyle="red";
    ctx.beginPath();
ctx.arc(food.x+10, food.y+10, 10, 0, Math.PI*2);
ctx.fillStyle="red";
ctx.fill();

    let head = {x:snake[0].x+dx,y:snake[0].y+dy};

    if(head.x===food.x && head.y===food.y){
        score++;
        food={
            x:Math.floor(Math.random()*20)*20,
            y:Math.floor(Math.random()*20)*20
        };
    }else{
        snake.pop();
    }

    snake.unshift(head);

    if(head.x<0 || head.y<0 || head.x>=400 || head.y>=400){
        alert("Game Over! Score: " + score);

snake = [{x:200,y:200}];
food = {x:100,y:100};
dx = 0;
dy = 0;
score = 0;
        
    }

    document.title="Score: "+score;
}

setInterval(draw,100);
</script>
</body><div style="margin-top:20px;">
    <button onclick="up()">⬆️</button><br><br>
    <button onclick="left()">⬅️</button>
    <button onclick="down()">⬇️</button>
    <button onclick="right()">➡️</button>
</div>

<script>
function up(){
    if(dy===0){dx=0;dy=-20;}
}
function down(){
    if(dy===0){dx=0;dy=20;}
}
function left(){
    if(dx===0){dx=-20;dy=0;}
}
function right(){
    if(dx===0){dx=20;dy=0;}
}
</script>
</html>
